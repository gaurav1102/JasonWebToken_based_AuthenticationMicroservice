spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:authservice}
spring.datasource.username=${POSTGRES_USERNAME:auth_user}
spring.datasource.password=${POSTGRES_PASSWORD:change-me}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:9898}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.security.jwt.secret=${JWT_SECRET:ZmFrZS1iYXNlNjQtc2VjcmV0LWZvci1kZXYtb25seS1jaGFuZ2UtbWU=}
app.security.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
app.security.jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

logging.level.org.springframework.security=INFO
logging.level.authservice=INFO
